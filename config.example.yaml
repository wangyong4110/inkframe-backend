# InkFrame Server Configuration
#
# 使用方式：cp config.example.yaml config.yaml，填写 [必填] 项
#
# AI API Key 等通过环境变量传入（不写入此文件）：
#   OPENAI_API_KEY / ANTHROPIC_API_KEY / GOOGLE_API_KEY
#   DOUBAO_API_KEY / DEEPSEEK_API_KEY / QIANWEN_API_KEY
#   KLING_API_KEY / SEEDANCE_API_KEY
#   QDRANT_ENDPOINT / QDRANT_API_KEY / CHROMA_ENDPOINT

# 服务器配置
server:
  host: "0.0.0.0"
  port: 8080
  mode: "debug"            # debug | release | test
  jwt_secret: ""           # [必填] 生产环境填入随机长字符串
  jwt_expiry: 24h
  read_timeout: 30s
  write_timeout: 30s
  max_header_bytes: 1048576
  shutdown_timeout: 10s

# 数据库配置（必填）
database:
  host: "localhost"        # [必填]
  port: 3306
  database: "inkframe"     # [必填] 需提前创建
  username: "root"         # [必填]
  password: ""             # [必填]
  charset: "utf8mb4"
  max_idle_conns: 10
  max_open_conns: 100
  conn_max_lifetime: 3600s
  table_prefix: "ink_"

# Redis配置
redis:
  host: "localhost"
  port: 6379
  password: ""
  db: 0
  pool_size: 100

# AI模型配置（Key 均从环境变量读取，此处只配置 Endpoint / Model）
ai:
  # $OPENAI_API_KEY
  openai:
    endpoint: "https://api.openai.com/v1"
    model: "gpt-4"
    max_tokens: 4096

  # $ANTHROPIC_API_KEY
  anthropic:
    endpoint: "https://api.anthropic.com/v1"
    model: "claude-3-opus-20240229"

  # $GOOGLE_API_KEY
  google:
    endpoint: "https://generativelanguage.googleapis.com/v1"
    model: "gemini-pro"

  # $DOUBAO_API_KEY — 火山引擎 Ark，含 Seedream 图像生成
  doubao:
    endpoint: "https://ark.volces.com/api/v3"
    model: "doubao-pro-32k"

  # $DEEPSEEK_API_KEY
  deepseek:
    endpoint: "https://api.deepseek.com/v1"
    model: "deepseek-chat"

  # $QIANWEN_API_KEY — 阿里云 DashScope，含 Wan 万象图像生成
  qianwen:
    endpoint: "https://dashscope.aliyuncs.com/compatible-mode/v1"
    model: "qwen-plus"

  # $SEEDANCE_API_KEY — 火山引擎 Ark，通常与豆包共用同一 Key
  seedance:
    endpoint: "https://ark.volces.com/api/v3"

  default:
    temperature: 0.7
    top_p: 0.9
    top_k: 40

# 文件存储配置（可选，不配置则跳过资产上传）
storage:
  type: "oss"              # oss（阿里云）| minio | local
  endpoint: ""             # 示例：https://oss-cn-hangzhou.aliyuncs.com
  access_key: ""           # OSS AccessKey ID
  secret_key: ""           # OSS AccessKey Secret
  bucket: "inkframe"
  region: "oss-cn-hangzhou"
  base_url: ""             # 公开访问域名，如 https://cdn.example.com

# 向量数据库配置（可选，不配置则禁用语义检索）
# Endpoint/Key 也可通过 $QDRANT_ENDPOINT / $QDRANT_API_KEY 传入
vector_db:
  type: "qdrant"           # qdrant | chroma
  endpoint: "http://localhost:6333"
  api_key: ""
  index_name: "inkframe"

# 日志配置
logger:
  level: "info"            # debug | info | warn | error
  format: "json"           # json | text
  output_path: "stdout"
