# InkFrame Server Configuration
#
# 使用方式：cp config.example.yaml config.yaml，填写 [必填] 项
#
# AI 模型/提供商均通过"模型管理"页面由租户配置，不再从此文件或环境变量读取 API Key。

# 服务器配置
server:
  host: "0.0.0.0"
  port: 8080
  mode: "debug"            # debug | release | test
  jwt_secret: "inkframe-dev-secret-change-in-production-2024"  # 生产环境请替换为 openssl rand -base64 48 生成的随机值
  jwt_expiry: 24h
  read_timeout: 30s
  write_timeout: 30s
  max_header_bytes: 1048576
  shutdown_timeout: 10s

# 数据库配置（必填）
database:
  host: "localhost"        # [必填]
  port: 3306
  database: "inkframe"     # [必填] 需提前创建
  username: "root"         # [必填]
  password: ""             # [必填]
  charset: "utf8mb4"
  max_idle_conns: 10
  max_open_conns: 100
  conn_max_lifetime: 3600s
  table_prefix: "ink_"

# Redis配置
redis:
  host: "localhost"
  port: 6379
  password: ""
  db: 0
  pool_size: 100

# 文件存储配置（可选，不配置则跳过资产上传）
storage:
  type: "oss"              # oss（阿里云）| minio | local
  endpoint: ""             # 示例：https://oss-cn-hangzhou.aliyuncs.com
  access_key: ""           # OSS AccessKey ID
  secret_key: ""           # OSS AccessKey Secret
  bucket: "inkframe"
  region: "oss-cn-hangzhou"
  base_url: ""             # 公开访问域名，如 https://cdn.example.com

# 向量数据库配置（可选，不配置则禁用语义检索）
# type 可选：qdrant | chroma | dashvector
#   qdrant:      本地/自托管，Endpoint 也可通过 $QDRANT_ENDPOINT / $QDRANT_API_KEY 传入
#   chroma:      本地开发首选，docker run -p 8000:8000 chromadb/chroma
#   dashvector:  阿里云全托管向量检索服务，API Key 建议通过 $DASHVECTOR_API_KEY 传入
vector_db:
  type: "qdrant"           # qdrant | chroma | dashvector
  endpoint: "http://localhost:6333"
  api_key: ""              # dashvector 建议留空，改用 $DASHVECTOR_API_KEY 环境变量
  index_name: "inkframe"

# 日志配置
logger:
  level: "info"            # debug | info | warn | error
  format: "json"           # json | text
  output_path: "stdout"

# 联网搜索配置（用于章节生成的"联网参考"功能）
# 启用方式：
#   1. 配置下方 provider/api_key/endpoint
#   2. 启动后在 MCP 工具管理页将"联网搜索"工具设为启用
#   3. 章节生成面板打开"联网参考"开关
# provider 可选：searxng（推荐国内）| bing | tavily
# API Key 也可通过 WEB_SEARCH_API_KEY 环境变量传入
#
# SearXNG 自托管一键启动（免费，支持百度/必应/Google）：
#   docker run -d --name searxng -p 8888:8080 -e SEARXNG_SECRET_KEY=mysecret searxng/searxng
web_search:
  provider: ""             # "searxng" | "bing" | "tavily" | ""（留空=禁用）
  api_key: ""              # Bing/Tavily 的 API Key（或用 WEB_SEARCH_API_KEY 环境变量）
  endpoint: ""             # SearXNG: http://localhost:8888（bing/tavily 留空）

# ─────────────────────────────────────────────
# 以下为可选功能模块，不配置时相关功能优雅降级
# ─────────────────────────────────────────────

# 邮件发送配置（用于邮箱验证、密码重置）
# 163 邮箱：需在 163 邮箱设置 → POP3/SMTP/IMAP → 开启 SMTP 服务，使用授权码作为 password
email:
  # ── 方式一：SMTP（需要出站 465/587 端口可达）──────────────────────────
  host: "smtp.163.com"
  port: 465
  username: "jianying2027@163.com"   # 你的邮箱
  password: "6cx3LbGiDPxwU6F"       # 邮箱授权码（非登录密码）
  from: "jianying2027@163.com"
  use_tls: true                      # 465=true(TLS)；587=false(STARTTLS)

  # ── 方式二：HTTP Webhook（SMTP 被防火墙封锁时使用）────────────────────
  # webhook_url: "https://your-email-relay.example.com/send"
  # webhook_token: "your-api-token"   # 可选，作为 Bearer Token 发送
  # Webhook 服务接收 POST {"to":"...","subject":"...","body":"..."}
  # 可对接 SendGrid/阿里云邮件推送/自建中继等任意 HTTP 邮件 API

  require_verification: false        # true=邮箱注册须验证后才能登录；false=注册即激活（默认）

# 短信验证码配置（用于手机号注册/登录，目前仅支持阿里云）
sms:
  access_key_id: ""        # 阿里云 AccessKey ID
  access_key_secret: ""    # 阿里云 AccessKey Secret
  sign_name: "简影"
  template_code: ""

# OAuth 第三方登录（每个 provider 可选填，留空=禁用）
# redirect_uri 需在对应开放平台填写为后端回调地址（不是前端）
oauth:
  wechat:
    app_id: ""               # 微信公众平台 AppID
    app_secret: ""           # 微信公众平台 AppSecret
    redirect_uri: "http://localhost:8080/api/v1/auth/oauth/wechat/callback"
  alipay:
    app_id: ""               # 支付宝开放平台 AppID（暂未实现，留空）
    private_key: ""          # 应用私钥（RSA2）
    public_key: ""           # 支付宝公钥
    redirect_uri: "http://localhost:8080/api/v1/auth/oauth/alipay/callback"
  douyin:
    app_id: ""               # 抖音开放平台 client_key
    app_secret: ""           # 抖音开放平台 client_secret
    redirect_uri: "http://localhost:8080/api/v1/auth/oauth/douyin/callback"

# 数据库字段加密密钥（用于 AES-256-GCM 加密平台账号 Token 等敏感字段）
# 必须为 32 字节的 base64 编码字符串，可用以下命令生成：
#   openssl rand -base64 32
# 也可通过 DB_ENCRYPTION_KEY 环境变量传入（推荐，避免写入配置文件）
encryption:
  db_key: ""               # 留空则跳过加密（字段明文存储）
