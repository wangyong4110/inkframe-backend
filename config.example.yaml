# InkFrame Server Configuration
#
# 使用方式：cp config.example.yaml config.yaml，填写 [必填] 项
#
# AI API Key 支持两种方式（环境变量优先，config.yaml 作为备选）：
#   方式一：直接写入本文件（适合开发/单机部署）
#   方式二：通过环境变量传入（适合容器/生产部署，优先级更高）
#     OPENAI_API_KEY / ANTHROPIC_API_KEY / GOOGLE_API_KEY
#     DOUBAO_API_KEY / DEEPSEEK_API_KEY / QIANWEN_API_KEY
#     KLING_API_KEY / SEEDANCE_API_KEY
#     VOLCENGINE_ACCESS_KEY / VOLCENGINE_SECRET_KEY
#     QDRANT_ENDPOINT / QDRANT_API_KEY / CHROMA_ENDPOINT

# 服务器配置
server:
  host: "0.0.0.0"
  port: 8080
  mode: "debug"            # debug | release | test
  jwt_secret: ""           # [必填] 生产环境填入随机长字符串
  jwt_expiry: 24h
  read_timeout: 30s
  write_timeout: 30s
  max_header_bytes: 1048576
  shutdown_timeout: 10s

# 数据库配置（必填）
database:
  host: "localhost"        # [必填]
  port: 3306
  database: "inkframe"     # [必填] 需提前创建
  username: "root"         # [必填]
  password: ""             # [必填]
  charset: "utf8mb4"
  max_idle_conns: 10
  max_open_conns: 100
  conn_max_lifetime: 3600s
  table_prefix: "ink_"

# Redis配置
redis:
  host: "localhost"
  port: 6379
  password: ""
  db: 0
  pool_size: 100

# AI模型配置
# api_key 可直接填写（env var 优先级更高，可留空改用环境变量）
ai:
  openai:
    api_key: ""                      # 或通过 $OPENAI_API_KEY 传入
    endpoint: "https://api.openai.com/v1"
    model: "gpt-4o"
    max_tokens: 4096

  anthropic:
    api_key: ""                      # 或通过 $ANTHROPIC_API_KEY 传入
    endpoint: "https://api.anthropic.com/v1"
    model: "claude-3-5-sonnet-20241022"

  google:
    api_key: ""                      # 或通过 $GOOGLE_API_KEY 传入
    endpoint: "https://generativelanguage.googleapis.com/v1"
    model: "gemini-pro"

  # 豆包（字节跳动火山引擎 Ark，含 Seedream 图像生成）
  doubao:
    api_key: ""                      # 或通过 $DOUBAO_API_KEY 传入
    endpoint: "https://ark.volces.com/api/v3"
    model: "doubao-pro-32k"

  deepseek:
    api_key: ""                      # 或通过 $DEEPSEEK_API_KEY 传入
    endpoint: "https://api.deepseek.com/v1"
    model: "deepseek-chat"

  # 通义千问（阿里云 DashScope，含 Wan 万象图像生成）
  qianwen:
    api_key: ""                      # 或通过 $QIANWEN_API_KEY 传入
    endpoint: "https://dashscope.aliyuncs.com/compatible-mode/v1"
    model: "qwen-plus"

  # Seedance 视频生成（火山引擎 Ark，通常与豆包共用同一 Key）
  seedance:
    api_key: ""                      # 或通过 $SEEDANCE_API_KEY 传入
    endpoint: "https://ark.volces.com/api/v3"

  # 快手可灵视频生成
  kling:
    api_key: ""                      # 或通过 $KLING_API_KEY 传入
    endpoint: ""

  # 火山引擎即梦AI图像生成（AK/SK 鉴权）
  volcengine_visual:
    access_key: ""                   # 或通过 $VOLCENGINE_ACCESS_KEY 传入
    secret_key: ""                   # 或通过 $VOLCENGINE_SECRET_KEY 传入

  # 各任务类型使用的 provider（留空则自动选择可用 provider）
  # 可选值：openai / anthropic / doubao / deepseek / qianwen / volcengine-visual / kling / seedance
  tasks:
    chapter_gen: ""        # 章节生成
    quality_check: ""      # 质量检查
    tts: ""                # 语音合成（仅 openai 支持）
    image_gen: ""          # 图像生成
    video_gen: ""          # 视频生成
    embedding: ""          # 向量嵌入

  default:
    temperature: 0.7
    top_p: 0.9
    top_k: 40

# 文件存储配置（可选，不配置则跳过资产上传）
storage:
  type: "oss"              # oss（阿里云）| minio | local
  endpoint: ""             # 示例：https://oss-cn-hangzhou.aliyuncs.com
  access_key: ""           # OSS AccessKey ID
  secret_key: ""           # OSS AccessKey Secret
  bucket: "inkframe"
  region: "oss-cn-hangzhou"
  base_url: ""             # 公开访问域名，如 https://cdn.example.com

# 向量数据库配置（可选，不配置则禁用语义检索）
# type 可选：qdrant | chroma | dashvector
#   qdrant:      本地/自托管，Endpoint 也可通过 $QDRANT_ENDPOINT / $QDRANT_API_KEY 传入
#   chroma:      本地开发首选，docker run -p 8000:8000 chromadb/chroma
#   dashvector:  阿里云全托管向量检索服务，API Key 建议通过 $DASHVECTOR_API_KEY 传入
vector_db:
  type: "qdrant"           # qdrant | chroma | dashvector
  endpoint: "http://localhost:6333"
  api_key: ""              # dashvector 建议留空，改用 $DASHVECTOR_API_KEY 环境变量
  index_name: "inkframe"

# 日志配置
logger:
  level: "info"            # debug | info | warn | error
  format: "json"           # json | text
  output_path: "stdout"
